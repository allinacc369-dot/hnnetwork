<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HN Network | Premium IT Solutions</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
    
    body {
      font-family: 'Inter', sans-serif;
    }

    .glass-nav {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .gradient-text {
      background: linear-gradient(90deg, #0047AB, #3B82F6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hover-card {
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .hover-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
    }

    /* Tùy chỉnh thanh cuộn */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-thumb {
      background: #0047AB;
      border-radius: 10px;
    }
  </style>
</head>
<body class="bg-[#fafafa] text-[#1a1a1a] selection:bg-blue-100 selection:text-blue-900">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const App = () => {
      const [scrolled, setScrolled] = useState(false);

      useEffect(() => {
        const handleScroll = () => setScrolled(window.scrollY > 20);
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      const categories = [
        { name: 'Server', icon: 'fa-server' },
        { name: 'Networking', icon: 'fa-network-wired' },
        { name: 'Storage', icon: 'fa-database' },
        { name: 'Security', icon: 'fa-shield-halved' },
        { name: 'Components', icon: 'fa-microchip' }
      ];

      const featuredProducts = [
        {
          id: 1,
          tag: 'Thế hệ mới',
          name: 'Cisco Catalyst 9200L Switch 24-port Data, 4 x 10G uplinks',
          desc: 'Nền tảng chuyển mạch hàng đầu với khả năng bảo mật và hiệu năng vượt trội cho doanh nghiệp.',
          price: 'Liên hệ báo giá',
          image: 'https://images.unsplash.com/photo-1544197150-b99a580bb7a8?auto=format&fit=crop&q=80&w=800'
        },
        {
          id: 2,
          tag: 'Hot Selling',
          name: 'Fortinet FortiGate 60F Next-Generation Firewall',
          desc: 'Giải pháp tường lửa thế hệ mới giúp bảo vệ mạng lưới doanh nghiệp trước các mối đe dọa phức tạp.',
          price: 'Giá cực tốt',
          image: 'https://images.unsplash.com/photo-1558494949-ef010cbdcc31?auto=format&fit=crop&q=80&w=800'
        },
        {
          id: 3,
          tag: 'Storage Hot',
          name: 'Synology DiskStation DS923+ 4-Bay NAS Storage',
          desc: 'Hệ thống lưu trữ dữ liệu thông minh, linh hoạt cho cá nhân và văn phòng nhỏ với hiệu suất cao.',
          price: 'Sẵn hàng',
          image: 'https://images.unsplash.com/photo-1591799264318-7e6ef8ddb7ea?auto=format&fit=crop&q=80&w=800'
        }
      ];

      const handleZaloRedirect = (phone) => {
        const cleanPhone = phone.replace(/\./g, '');
        window.open(`https://zalo.me/${cleanPhone}`, '_blank');
      };

      return (
        <div className="min-h-screen flex flex-col">
          {/* NAVIGATION BAR */}
          <nav className={`fixed top-0 w-full z-50 transition-all duration-300 ${scrolled ? 'glass-nav py-3 border-b border-gray-100 shadow-sm' : 'bg-transparent py-6'}`}>
            <div className="container mx-auto px-6 flex items-center justify-between">
              <a href="#" className="flex items-center gap-3">
                <div className="bg-blue-600 w-10 h-10 rounded-lg flex items-center justify-center">
                    <span className="text-white font-extrabold text-xl italic">HN</span>
                </div>
                <span className="font-extrabold text-xl tracking-tighter text-blue-900 hidden sm:inline text-nowrap">HN NETWORK</span>
              </a>

              <div className="hidden md:flex items-center gap-8 font-medium text-sm uppercase tracking-widest text-gray-600">
                <a href="#" className="hover:text-blue-600 transition-colors">Sản phẩm</a>
                <a href="#" className="hover:text-blue-600 transition-colors">Giải pháp</a>
                <a href="#" className="hover:text-blue-600 transition-colors">Dịch vụ</a>
                <a href="#" className="hover:text-blue-600 transition-colors">Về chúng tôi</a>
              </div>

              <div className="flex items-center gap-4">

                    <span className="text-[10px] text-gray-400 font-bold uppercase tracking-tighter text-nowrap">Hotline 24/7</span>
                    <span className="text-blue-600 font-bold text-nowrap">0938.888.304</span>
                </div>
                <button 
                  onClick={() => handleZaloRedirect('0938888304')}
                  className="bg-blue-600 text-white px-5 py-2.5 rounded-full text-sm font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all text-nowrap"
                >
                  Báo giá ngay
                </button>
              </div>
            </div>
          </nav>

          {/* HERO SECTION */}
          <section className="relative pt-32 pb-20 overflow-hidden">
            <div className="container mx-auto px-6 grid lg:grid-cols-2 gap-12 items-center">
              <div className="z-10">
                <span className="inline-block px-4 py-1.5 rounded-full bg-blue-50 text-blue-600 text-xs font-bold uppercase tracking-widest mb-6 border border-blue-100">
                  Công nghệ hạ tầng 4.0
                </span>
                <h1 className="text-5xl md:text-7xl font-extrabold leading-[1.1] mb-8 text-slate-900">
                  Nâng tầm <br/>
                  <span className="gradient-text">Hạ tầng Mạng</span>
                </h1>
                <p className="text-lg text-gray-500 mb-10 max-w-lg leading-relaxed">
                  Chúng tôi cung cấp các giải pháp máy chủ, lưu trữ và bảo mật tối ưu nhất cho doanh nghiệp, đảm bảo sự ổn định và an toàn tuyệt đối.
                </p>
                <div className="flex flex-wrap gap-4">
                  <button className="bg-slate-900 text-white px-8 py-4 rounded-xl font-bold hover:bg-slate-800 transition-all shadow-xl">
                    Khám phá sản phẩm
                  </button>
                  <button className="border border-gray-200 px-8 py-4 rounded-xl font-bold hover:bg-gray-50 transition-all">
                    Giải pháp doanh nghiệp
                  </button>
                </div>
              </div>
              
              <div className="relative">
                <div className="absolute -inset-4 bg-blue-100/50 rounded-full blur-3xl -z-10"></div>
                <div className="bg-white p-4 rounded-[2rem] shadow-2xl border border-gray-100 rotate-2 hover:rotate-0 transition-transform duration-500">
                  <img 
                    src="https://images.unsplash.com/photo-1597733336794-12d05021d510?auto=format&fit=crop&q=80&w=1000" 
                    className="rounded-[1.5rem] w-full object-cover aspect-video"
                    alt="Cơ sở hạ tầng mạng hiện đại"
                  />
                </div>
              </div>
            </div>
          </section>

            <div className="container mx-auto px-6">
              <div className="flex flex-wrap justify-center gap-8 md:gap-16">
                {categories.map((item, i) => (
                  <div key={i} className="flex items-center gap-3 group cursor-pointer">
                    <div className="w-12 h-12 rounded-2xl bg-gray-50 flex items-center justify-center text-gray-400 group-hover:bg-blue-600 group-hover:text-white transition-all">
                      <i className={`fa ${item.icon} text-lg`}></i>
                    </div>
                    <span className="font-bold text-gray-800 tracking-tight group-hover:text-blue-600 transition-colors uppercase text-xs">{item.name}</span>

              </div>
            </div>
          </section>

          {/* PRODUCTS SECTION */}
          <section className="py-24">
            <div className="container mx-auto px-6">
              <div className="flex flex-col md:flex-row md:items-end justify-between mb-16 gap-4 text-center md:text-left">
                <div>

                  <p className="text-gray-500">Thiết bị CNTT cao cấp được tin dùng nhất hiện nay.</p>
                </div>
                <a href="#" className="font-bold text-blue-600 hover:text-blue-700 flex items-center justify-center gap-2 underline decoration-2 underline-offset-4 transition-all">

                </a>
              </div>

              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10">
                {featuredProducts.map((product) => (
                  <div key={product.id} className="bg-white rounded-3xl border border-gray-100 hover-card group flex flex-col h-full overflow-hidden">
                    <div className="aspect-[4/3] relative overflow-hidden">
                      <img 
                        src={product.image} 
                        alt={product.name} 
                        className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700"
                      />
                      <div className="absolute top-4 left-4 bg-blue-600 text-white text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-wider shadow-lg">
                        {product.tag}
                      </div>
                      <div className="absolute inset-0 bg-gradient-to-t from-slate-900/40 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    </div>
                    
                    <div className="p-8 flex flex-col flex-grow">
                      <h3 className="text-xl font-bold text-slate-800 mb-4 line-clamp-2 leading-tight group-hover:text-blue-600 transition-colors italic">
                        {product.name}
                      </h3>
                      <p className="text-gray-500 text-sm mb-8 leading-relaxed line-clamp-3">
                        {product.desc}
                      </p>
                      <div className="flex items-center justify-between mt-auto pt-6 border-t border-gray-50">
                        <span className="text-blue-600 font-extrabold text-lg tracking-tight uppercase">{product.price}</span>
                        <button 
                          onClick={() => handleZaloRedirect('0938888304')}
                          className="bg-gray-900 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-blue-600 transition-all flex items-center gap-2"
                        >
                          Chi tiết <i className="fa fa-chevron-right text-[10px]"></i>
                        </button>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* FOOTER AREA */}
          <footer className="mt-auto bg-slate-900 text-white pt-20 pb-10">
            <div className="container mx-auto px-6">
              <div className="grid grid-cols-1 lg:grid-cols-12 gap-12 mb-16">
                
                {/* Brand & Support */}
                <div className="lg:col-span-4">
                  <h4 className="text-blue-400 text-xs font-black uppercase tracking-[0.2em] mb-8">Hỗ trợ kinh doanh</h4>
                  <div className="grid gap-4">
                    <div 
                      onClick={() => handleZaloRedirect('0938.888.304')}
                      className="bg-white/5 border border-white/10 p-5 rounded-2xl backdrop-blur-sm hover:border-blue-500/30 transition-all group cursor-pointer"
                    >
                      <div className="flex justify-between items-center mb-1">
                        <span className="text-gray-400 text-[10px] font-bold uppercase">Kinh doanh 1</span>
                        <i className="fa fa-phone text-blue-400 text-xs group-hover:rotate-12 transition-transform"></i>
                      </div>
                      <p className="text-xl font-bold">0938.888.304</p>
                    </div>
                    <div 
                      onClick={() => handleZaloRedirect('0974.700.952')}
                      className="bg-white/5 border border-white/10 p-5 rounded-2xl backdrop-blur-sm hover:border-blue-500/30 transition-all group cursor-pointer"
                    >
                      <div className="flex justify-between items-center mb-1">
                        <span className="text-gray-400 text-[10px] font-bold uppercase">Kinh doanh 2</span>
                        <i className="fa fa-phone text-blue-400 text-xs group-hover:rotate-12 transition-transform"></i>
                      </div>
                      <p className="text-xl font-bold">0974.700.952</p>
                    </div>
                  </div>
                </div>

                {/* Info */}
                <div className="lg:col-span-4">
                  <h4 className="text-blue-400 text-xs font-black uppercase tracking-[0.2em] mb-8">Liên hệ trực tiếp</h4>
                  <div className="space-y-6">
                    <div className="flex gap-4">
                      <div className="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center text-blue-400 shrink-0">
                        <i className="fa fa-map-marker-alt"></i>
                      </div>
                      <div>
                        <h5 className="text-sm font-bold mb-1 uppercase tracking-wider">Trụ sở chính</h5>
                        <p className="text-gray-400 text-sm leading-relaxed">2A Thành Công, Tân Thành, Tân Phú, TP. HCM</p>
                      </div>
                    </div>
                    <div className="flex gap-4">
                      <div className="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center text-blue-400 shrink-0">
                        <i className="fa fa-headset"></i>
                      </div>
                      <div>
                        <h5 className="text-sm font-bold mb-1 uppercase tracking-wider">Tổng đài & Email</h5>
                        <p className="text-gray-400 text-sm leading-relaxed">Hotline: (028) 668 42 689</p>
                        <p className="text-gray-400 text-sm leading-relaxed">Email: info@hnnetwork.vn</p>
                      </div>
                    </div>
                    <div className="flex gap-4 pt-2">
                      <a href="https://www.facebook.com/hnnetwork.vn" target="_blank" className="w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center hover:bg-blue-600 transition-all"><i className="fab fa-facebook-f"></i></a>
                      <a href="#" className="w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center hover:bg-red-600 transition-all"><i className="fab fa-youtube"></i></a>
                    </div>
                  </div>
                </div>

                {/* Map */}
                <div className="lg:col-span-4">
                   <h4 className="text-blue-400 text-xs font-black uppercase tracking-[0.2em] mb-8">Vị trí bản đồ</h4>
                   <div className="rounded-3xl overflow-hidden grayscale hover:grayscale-0 transition-all duration-1000 border border-white/10 shadow-2xl h-[250px]">
                      <iframe 
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3919.2412216077746!2d106.63263728527505!3d10.792827961914577!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x317529532c42131f%3A0xc72609f9f908c1cc!2zMkEgVGjDoG5oIEPDtG5nLCBUw6JuIFRow6BuaCwgVMOibiBQaMO6LCBUaMOgbmggcGjhu5EgSOG7kyBDaMOtIE1pbmgsIFZp4buHdCBOYW0!5e0!3m2!1svi!2s!4v1772251814694!5m2!1svi!2s" 
                        width="100%" height="100%" frameBorder="0" style={{ border:0 }} allowFullScreen loading="lazy"
                      ></iframe>
                   </div>
                </div>

              </div>

              <div className="pt-10 border-t border-white/5 flex flex-col md:flex-row justify-between items-center gap-6 text-[9px] text-gray-600 font-black uppercase tracking-widest">
                <p>&copy; 2026 HN Network Enterprise Solutions. All Rights Reserved.</p>
                <div className="flex gap-8">
                  <a href="#" className="hover:text-blue-400 transition-colors">Privacy Policy</a>
                  <a href="#" className="hover:text-blue-400 transition-colors">Terms of Service</a>
                </div>
              </div>
            </div>
          </footer>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
