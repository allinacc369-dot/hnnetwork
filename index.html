<!DOCTYPE html>
<html lang="vi">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HN Network - Giải pháp CNTT</title>

  <!-- FontAwesome Icons -->

  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

      ];

        setActiveCategory(category);
        setCurrentPage('page2');
        setIsMobileMenuOpen(false);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const navigateToHome = () => {
        setCurrentPage('home');
        setActiveCategory(null);

              </div>
              <div className="mt-16 pt-8 border-t border-slate-800 text-sm flex flex-col md:flex-row justify-between items-center text-slate-500">
                <p>&copy; 2026 Bản quyền thuộc về HN Network. (Giao diện Demo)</p>
                <div className="flex space-x-6 mt-4 md:mt-0 font-medium text-xs uppercase tracking-wider">
                  <span className="hover:text-white cursor-pointer transition-colors">Điều khoản</span>
                  <span className="hover:text-white cursor-pointer transition-colors">Bảo mật</span>
                </div>
              </div>
            </div>
          </footer>
        </div>

                    <p className="text-slate-500 text-sm mt-3 font-medium border-l-2 border-slate-200 pl-3">22x GE RJ45, 4x SFP, Dual Power Supply, UTM Protection</p>
                    <div className="mt-5 text-lg font-black text-slate-900 flex items-center justify-between">
                       <span>Liên hệ nhận báo giá</span>
                       <div className="w-10 h-10 rounded-full border border-slate-200 flex items-center justify-center text-slate-400 group-hover:bg-[#0047AB] group-hover:text-white group-hover:border-[#0047AB] transition-all">
                          <i className="fa-solid fa-chevron-right"></i>
                       </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </section>
        </div>
      );
    }

    // ---------------------------------------------------------
    // TRANG 2: CATEGORY VIEW - Trang chi tiết sản phẩm thuộc Menu
    // ---------------------------------------------------------
    function Page2View({ category, onBack }) {
      if (!category) return null;

      const mockProducts = Array.from({ length: 12 }, (_, i) => ({
        id: i + 1,
        code: `${category.name.substring(0,3).toUpperCase()}-${1000 + i}`,
        brand: ['DELL', 'HP', 'CISCO', 'FORTINET', 'IBM'][i % 5],
        isHot: i === 1 || i === 4
      }));

      return (
        <div className="animate-in slide-in-from-right-8 duration-500 bg-slate-50 min-h-screen pb-24">
          
          <div className="bg-white border-b border-slate-200 pt-10 pb-16 relative overflow-hidden">
            <div className="absolute right-0 top-0 w-1/3 h-full bg-gradient-to-l from-blue-50 to-transparent pointer-events-none"></div>
            <i className={`fa-solid ${category.icon} absolute -right-10 top-10 text-[16rem] text-slate-50 opacity-50 rotate-12 pointer-events-none`}></i>

            <div className="max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
              
              <nav className="flex items-center text-sm font-bold text-slate-500 mb-10 tracking-wide uppercase">
                <button 
                  onClick={onBack} 
                  className="hover:text-[#0047AB] flex items-center transition-colors bg-slate-100 hover:bg-blue-50 px-3 py-1.5 rounded-md"
                >
                  <i className="fa-solid fa-arrow-left mr-2"></i> Trang chủ
                </button>
                <i className="fa-solid fa-chevron-right mx-3 text-slate-300 text-[10px]"></i>
                <span className="text-[#0047AB]">{category.name}</span>
              </nav>

              <div className="flex flex-col md:flex-row md:items-end md:justify-between">
                <div className="flex items-start">
                  <div className="w-20 h-20 bg-[#0047AB] rounded-2xl flex items-center justify-center mr-8 shadow-xl shadow-blue-900/20 shrink-0 mt-1">
                    <i className={`fa-solid ${category.icon} text-4xl text-white`}></i>
                  </div>
                  <div>
                    <h1 className="text-4xl md:text-5xl font-extrabold text-slate-900 tracking-tight mb-4 leading-tight">
                      {category.name}
                    </h1>
                    <p className="text-lg text-slate-500 max-w-3xl font-medium leading-relaxed">
                      {category.desc} Danh mục cung cấp đầy đủ các thiết bị công nghệ hiện đại, đáp ứng mọi quy mô và nhu cầu khắt khe của hệ thống CNTT.
                    </p>
                  </div>
                </div>
                
                <div className="mt-8 md:mt-0 bg-slate-100 px-5 py-3 rounded-xl flex flex-col items-center shrink-0">
                   <span className="text-3xl font-black text-slate-900">{mockProducts.length}</span>
                   <span className="text-xs font-bold text-slate-500 uppercase tracking-wider">Sản phẩm</span>
                </div>
              </div>
            </div>
          </div>

          <div className="max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8 -mt-8 relative z-20">
            
            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 mb-10 flex flex-col sm:flex-row justify-between items-center gap-4">
               <div className="flex space-x-2 w-full sm:w-auto overflow-x-auto pb-2 sm:pb-0 scrollbar-hide">
                  <button className="px-5 py-2.5 bg-[#0047AB] text-white text-sm font-bold rounded-xl whitespace-nowrap shadow-md shadow-[#0047AB]/20">Tất cả sản phẩm</button>
                  <button className="px-5 py-2.5 bg-slate-50 text-slate-600 hover:text-slate-900 hover:bg-slate-100 text-sm font-bold rounded-xl whitespace-nowrap transition-colors">Theo hãng</button>
                  <button className="px-5 py-2.5 bg-slate-50 text-slate-600 hover:text-slate-900 hover:bg-slate-100 text-sm font-bold rounded-xl whitespace-nowrap transition-colors">Theo cấu hình</button>
               </div>
               
               <div className="relative w-full sm:w-72">
                 <input 
                    type="text" 
                    placeholder={`Tìm trong ${category.name}...`} 
                    className="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-medium text-slate-800 focus:outline-none focus:ring-2 focus:ring-[#0047AB]/50 focus:border-[#0047AB] transition-all" 
                 />
                 <i className="fa-solid fa-magnifying-glass absolute left-4 top-4 text-slate-400"></i>
               </div>
            </div>

            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 md:gap-8">
              {mockProducts.map((product) => (
                <div key={product.id} className="bg-white rounded-3xl border border-slate-200 overflow-hidden hover:shadow-2xl hover:shadow-blue-900/10 hover:-translate-y-1 transition-all duration-300 group flex flex-col">
                  
                  <div className="aspect-[4/3] bg-slate-50 relative flex items-center justify-center p-8 group-hover:bg-blue-50/50 transition-colors">
                    <i className={`fa-solid ${category.icon} text-[5rem] text-slate-300 group-hover:scale-110 group-hover:text-[#0047AB]/60 transition-all duration-500`}></i>
                    
                    <div className="absolute top-4 left-4 flex flex-col gap-2">
                      <span className="bg-white border border-slate-200 text-slate-700 text-[10px] font-black px-2 py-1 rounded shadow-sm uppercase tracking-wider">
                        {product.brand}
                      </span>
                      {product.isHot && (
                        <span className="bg-orange-500 text-white text-[10px] font-black px-2 py-1 rounded shadow-sm shadow-orange-500/30 uppercase tracking-wider">
                          Bán Chạy
                        </span>
                      )}
                    </div>
                  </div>

                  <div className="p-6 flex flex-col flex-grow bg-white border-t border-slate-100">
                    <div className="text-xs text-[#0047AB] font-black mb-2 uppercase tracking-widest">{category.name}</div>
                    <h3 className="font-extrabold text-slate-900 text-lg mb-2 group-hover:text-[#0047AB] transition-colors line-clamp-2 leading-snug">
                      Thiết bị {category.name} Cao Cấp - {product.code}
                    </h3>
                    <p className="text-sm text-slate-500 font-medium mb-6 line-clamp-2">
                      Sản phẩm thế hệ mới của {product.brand}. Cung cấp hiệu năng vượt trội, độ tin cậy cao phù hợp chuẩn hệ thống Data Center.
                    </p>
                    
                    <div className="flex items-center justify-between mt-auto pt-5 border-t border-dashed border-slate-200">
                      <div className="flex flex-col">
                        <span className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Giá Dự Án</span>
                        <span className="font-black text-xl text-slate-900 group-hover:text-[#0047AB] transition-colors">Liên hệ</span>
                      </div>
                      <button className="w-12 h-12 flex items-center justify-center bg-slate-50 text-[#0047AB] hover:bg-[#0047AB] hover:text-white rounded-xl transition-all shadow-sm">
                        <i className="fa-solid fa-cart-shopping"></i>
                      </button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
            
            <div className="flex justify-center mt-16">
               <div className="flex space-x-2 bg-white p-2 rounded-2xl border border-slate-200 shadow-sm">
                  <button className="w-12 h-12 flex items-center justify-center rounded-xl text-slate-400 hover:bg-slate-50 disabled:opacity-50 transition-colors" disabled>
                    <i className="fa-solid fa-arrow-left"></i>
                  </button>
                  <button className="w-12 h-12 flex items-center justify-center rounded-xl bg-[#0047AB] text-white font-bold shadow-md shadow-[#0047AB]/30">1</button>
                  <button className="w-12 h-12 flex items-center justify-center rounded-xl text-slate-700 hover:bg-slate-50 font-bold transition-colors">2</button>
                  <button className="w-12 h-12 flex items-center justify-center rounded-xl text-slate-700 hover:bg-slate-50 font-bold transition-colors">3</button>
                  <div className="w-12 h-12 flex items-center justify-center text-slate-400 font-bold">...</div>
                  <button className="w-12 h-12 flex items-center justify-center rounded-xl text-slate-700 hover:bg-slate-50 transition-colors">
                    <i className="fa-solid fa-chevron-right"></i>
                  </button>
               </div>
            </div>

          </div>
        </div>
      );
    }

    // Render Ứng dụng
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
