<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HN Network - Giải pháp CNTT</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [currentPage, setCurrentPage] = useState('home');
      const [activeCategory, setActiveCategory] = useState(null);
      const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

      const menuItems = [
        { id: 1, name: 'Máy Chủ', icon: 'fa-server', desc: 'Hệ thống máy chủ hiệu năng cao, tối ưu cho doanh nghiệp.' },
        { id: 2, name: 'Thiết Bị Mạng', icon: 'fa-network-wired', desc: 'Switch, Router, Access Point và giải pháp mạng toàn diện.' },
        { id: 3, name: 'Lưu Trữ', icon: 'fa-hard-drive', desc: 'Thiết bị lưu trữ NAS/SAN an toàn, dung lượng lớn.' },
        { id: 4, name: 'Bảo Mật', icon: 'fa-shield-halved', desc: 'Tường lửa thế hệ mới và giải pháp an toàn thông tin.' },
        { id: 5, name: 'Máy Tính', icon: 'fa-desktop', desc: 'PC, Workstation, Laptop cho văn phòng và đồ họa.' },
        { id: 6, name: 'Phần Mềm', icon: 'fa-code', desc: 'Cung cấp bản quyền phần mềm hệ thống và ứng dụng.' },
        { id: 7, name: 'Linh Kiện', icon: 'fa-microchip', desc: 'Linh kiện thay thế, nâng cấp chính hãng các loại.' },
        { id: 8, name: 'Dịch Vụ IT', icon: 'fa-screwdriver-wrench', desc: 'Dịch vụ bảo trì, triển khai và tư vấn giải pháp CNTT.' },
      ];

      const navigateToPage2 = (category) => {
        setActiveCategory(category);
        setCurrentPage('page2');
        setIsMobileMenuOpen(false);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const navigateToHome = () => {
        setCurrentPage('home');
        setActiveCategory(null);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      return (
        <div className="min-h-screen bg-slate-50 text-slate-800 font-sans selection:bg-blue-200">
          <header className="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-200 shadow-sm">
            <div className="max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex justify-between items-center h-20">
                
                {/* LOGO ĐÃ SỬA: Sử dụng đường dẫn tương đối trực tiếp đến file ảnh trên GitHub */}
                <div className="flex items-center cursor-pointer group" onClick={navigateToHome}>
                  <div className="w-14 h-14 mr-3 flex items-center justify-center overflow-hidden">
                    <img 
                      src="Logo HN-04.png" 
                      alt="HN Network Logo" 
                      className="w-full h-full object-contain"
                      onError={(e) => {
                        // Nếu ảnh không load được, hiển thị icon dự phòng
                        e.target.style.display = 'none';
                        e.target.parentNode.innerHTML = '<i class="fa-solid fa-network-wired text-[#0047AB] text-3xl"></i>';
                      }}
                    />
                  </div>
                  <span className="text-2xl font-extrabold tracking-tight text-slate-900">
                    HN<span className="text-[#0047AB]">Network</span>
                  </span>
                </div>

                <nav className="hidden xl:flex space-x-1 lg:space-x-2">
                  {menuItems.map((item) => (
                    <button
                      key={item.id}
                      onClick={() => navigateToPage2(item)}
                      className={`text-sm font-semibold px-3 py-2 rounded-lg transition-all whitespace-nowrap ${
                        activeCategory?.id === item.id && currentPage === 'page2'
                          ? 'bg-blue-50 text-[#0047AB]'
                          : 'text-slate-600 hover:text-[#0047AB] hover:bg-slate-50'
                      }`}
                    >
                      {item.name}
                    </button>
                  ))}
                </nav>

                <div className="hidden lg:flex items-center space-x-3">
                  <button className="ml-2 bg-[#0047AB] hover:bg-blue-800 text-white px-5 py-2 rounded-full text-sm font-semibold transition-all shadow-md flex items-center">
                    <i className="fa-solid fa-phone mr-2"></i> Liên Hệ
                  </button>
                </div>

                <div className="flex items-center xl:hidden">
                  <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="text-slate-500 p-2">
                    <i className={`fa-solid ${isMobileMenuOpen ? 'fa-xmark' : 'fa-bars'} text-2xl`}></i>
                  </button>
                </div>
              </div>
            </div>
          </header>

          <main className="min-h-[calc(100vh-160px)]">
            {currentPage === 'home' ? (
              <HomeView menuItems={menuItems} navigateToPage2={navigateToPage2} />
            ) : (
              <Page2View category={activeCategory} onBack={navigateToHome} />
            )}
          </main>

          <footer className="bg-slate-900 text-slate-300 py-16 border-t-4 border-[#0047AB]">
            <div className="max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8 text-center md:text-left">
               <p>&copy; 2026 Bản quyền thuộc về HN Network.</p>
            </div>
          </footer>
        </div>
      );
    }

    function HomeView({ menuItems, navigateToPage2 }) {
      return (
        <div className="animate-in fade-in duration-700">
          <section className="relative bg-[#0a192f] text-white overflow-hidden">
            <div className="absolute inset-0 bg-gradient-to-r from-[#003366]/90 to-transparent z-10"></div>
            <div className="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1558494949-ef010cbdcc31?q=80&w=2034&auto=format&fit=crop')] bg-cover bg-right bg-no-repeat opacity-40"></div>
            
            <div className="max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8 relative z-20">
              <div className="py-24 md:py-36 lg:py-48 max-w-3xl">
                <h1 className="text-4xl sm:text-5xl md:text-7xl font-extrabold mb-6">Xây dựng nền tảng Số Hóa</h1>
                <p className="text-lg md:text-2xl text-slate-300 mb-10">Giải pháp Máy chủ, Mạng và Bảo mật chuyên nghiệp.</p>
                <button onClick={() => navigateToPage2(menuItems[0])} className="bg-[#0047AB] px-8 py-4 rounded-xl font-bold text-lg">Khám phá ngay</button>
              </div>
            </div>
          </section>

          <section className="py-24 bg-slate-50">
            <div className="max-w-[1400px] mx-auto px-4">
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                {menuItems.map((item) => (
                  <div key={item.id} onClick={() => navigateToPage2(item)} className="bg-white p-8 rounded-3xl border border-slate-200 cursor-pointer hover:shadow-xl transition-all">
                    <div className="w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center mb-6">
                      <i className={`fa-solid ${item.icon} text-3xl text-[#0047AB]`}></i>
                    </div>
                    <h3 className="text-xl font-bold mb-3">{item.name}</h3>
                    <p className="text-slate-600 text-sm">{item.desc}</p>
                  </div>
                ))}
              </div>
            </div>
          </section>
        </div>
      );
    }

    function Page2View({ category, onBack }) {
      if (!category) return null;
      return (
        <div className="p-8 max-w-[1400px] mx-auto">
          <button onClick={onBack} className="mb-6 text-[#0047AB] font-bold flex items-center">
            <i className="fa-solid fa-arrow-left mr-2"></i> Quay lại trang chủ
          </button>
          <h1 className="text-4xl font-bold mb-4">{category.name}</h1>
          <p className="text-slate-500">{category.desc}</p>
          <div className="mt-12 grid grid-cols-1 md:grid-cols-3 gap-8">
             {[1,2,3].map(i => (
               <div key={i} className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                  <div className="aspect-video bg-slate-100 rounded-xl mb-4 flex items-center justify-center">
                     <i className={`fa-solid ${category.icon} text-5xl text-slate-300`}></i>
                  </div>
                  <h4 className="font-bold">Sản phẩm mẫu {category.name} #{i}</h4>
                  <p className="text-sm text-slate-400 mt-2">Thông số kỹ thuật chi tiết của thiết bị...</p>
                  <button className="mt-4 w-full py-2 bg-[#0047AB] text-white rounded-lg font-bold">Xem báo giá</button>
               </div>
             ))}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
